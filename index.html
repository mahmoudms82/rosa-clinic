<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <meta
      name="description"
      content="احجزي موعدك الآن في عيادات روزا لطب الأسنان  واحصلي على ابتسامة هوليوود بأفضل الأسعار."
    />

    <!-- Open Graph / Social Media Preview (WhatsApp, Facebook, etc.) -->
    <meta property="og:title" content="✨ عيادات روزا للتجميل وطب الأسنان" />
    <meta
      property="og:description"
      content="خصم 20% على ابتسامة هوليوود، تبييض الأسنان، والتقويم الثابت. احجزي موعدك أونلاين الآن واستمتعي بابتسامة نجوم ✨"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://mahmoudms82.github.io/rosa-clinic"
    />
    <meta
      property="og:image"
      content="https://mahmoudms82.github.io/rosa-clinic/thumb.png"
    />
    <meta property="og:image:secure_url" content="https://mahmoudms82.github.io/rosa-clinic/thumb.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="420" />
    <meta property="og:site_name" content="عيادات روزا" />

    <!-- Twitter Preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="✨ عيادات روزا للتجميل وطب الأسنان" />
    <meta name="twitter:description" content="خصم 20% على ابتسامة هوليوود، تبييض الأسنان، والتقويم الثابت. احجزي موعدك أونلاين الآن واستمتعي بابتسامة نجوم ✨" />
    <meta name="twitter:image" content="https://mahmoudms82.github.io/rosa-clinic/thumb.png" />

    <meta name="theme-color" content="#8a6d4d" />

    <title>عيادات روزا</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="thumb.png" type="image/png" />
  </head>
  <body class="text-[#4a3b32]">
    <!-- Top Bar -->
    <div
      class="bg-[#8a6d4d] text-white text-center py-2 px-4 text-xs font-semibold sticky top-0 z-50"
    >
      🤩 استخدمي كود الخصم
      <span class="bg-white text-[#8a6d4d] px-1.5 py-0.5 rounded mx-1"
        >W30</span
      >
      واحصلي على خصم 20% إضافي!
    </div>

    <!-- Hero Section - Full Cover Photo -->
    <section
      class="hero-bg relative h-screen flex items-center justify-center text-center text-white overflow-hidden"
    >
      <div class="absolute inset-0 bg-black/40"></div>

      <div class="relative z-10 px-6 max-w-2xl">
        <h1 class="text-4xl md:text-5xl font-bold mb-4 leading-tight">
          ابتسامة تستحقينها
        </h1>
        <p class="text-xl md:text-2xl mb-8">عيادات روزا للتجميل و طب الأسنان</p>
        <a
          href="#booking-form"
          id="scrollToForm"
          class="inline-block bg-[#8a6d4d] hover:bg-[#735a3f] text-white font-semibold px-10 py-4 rounded-2xl text-lg transition-all duration-300"
        >
          احجزي موعدك الآن ↓
        </a>
      </div>

      <div
        class="absolute bottom-10 left-1/2 transform -translate-x-1/2 text-4xl animate-bounce"
      >
        ↓
      </div>
    </section>

    <!-- Form Section with background.jpg -->
    <section id="booking-form" class="form-bg py-16">
      <div class="max-w-lg mx-auto px-4">
        <div class="form-card p-6 md:p-8 rounded-3xl text-right">
          <h2 class="text-2xl font-semibold text-[#8a6d4d] mb-1 text-center">
            احجزي موعدك الآن
          </h2>
          <p class="text-xs text-gray-500 mb-8 text-center">
            العناية الفاخرة التي تستحقينها
          </p>

          <!-- ==================== YOUR ORIGINAL FORM - 100% UNCHANGED ==================== -->
          <form id="appointmentForm" class="space-y-4">
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1"
                >اسم الكريم</label
              >
              <input
                type="text"
                name="name"
                required
                class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#8a6d4d] focus:outline-none text-right text-sm"
                placeholder="الاسم ثلاثي"
              />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1"
                >رقم الجوال</label
              >
              <input
                type="tel"
                name="phone"
                required
                class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#8a6d4d] focus:outline-none text-left text-sm"
                placeholder="05xxxxxxxx"
                dir="ltr"
              />
            </div>
            <div class="flex items-center gap-2 py-1">
              <input
                type="checkbox"
                id="is_gift"
                name="is_gift"
                class="w-4 h-4 text-[#8a6d4d] focus:ring-[#8a6d4d] border-gray-300 rounded"
              />
              <label
                for="is_gift"
                class="text-xs font-bold text-gray-700 cursor-pointer"
                >إرسال الحجز كهدية لشخص آخر 🎁</label
              >
            </div>
            <div
              id="gift_fields"
              class="hidden space-y-3 bg-gray-50 p-3 rounded-lg border border-dashed border-gray-300"
            >
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1"
                  >اسم المهدى إليه (المستلم)</label
                >
                <input
                  type="text"
                  name="sender_name"
                  class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#8a6d4d] focus:outline-none text-right text-sm"
                  placeholder="اسم الشخص المستلم"
                />
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1"
                  >جوال المهدى إليه</label
                >
                <input
                  type="tel"
                  name="sender_phone"
                  class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#8a6d4d] focus:outline-none text-left text-sm"
                  placeholder="جوال الشخص المستلم"
                  dir="ltr"
                />
              </div>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1"
                >اختر العرض المناسب</label
              >
              <select
                name="offer"
                required
                class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#8a6d4d] focus:outline-none text-right text-sm bg-white"
              >
                <option value="">- اضغط للاختيار -</option>
                <option value="ديرما بن + إبرة نضارة وتوريد شفاه">ديرما بن + إبرة نضارة وتوريد شفاه (500 ريال) 🌸</option>
                <option value="إبرة ديفا للوجه + تنظيف وتلميع أسنان + 5 جلسات شد اللغلوغ + توريد شفاه">إبرة ديفا للوجه + تنظيف وتلميع أسنان + 5 جلسات شد اللغلوغ + توريد شفاه (1500 ريال) ✨</option>
                <option value="فراكشنال + سكارليت + بلازما">فراكشنال + سكارليت + بلازما (1000 ريال) 💎</option>
                <option value="تقشير وجه كامل + إبرة سالمون">تقشير وجه كامل + إبرة سالمون (995 ريال) 🧴</option>
                <option value="فيلر ستيلاج (1 مللي)">فيلر ستيلاج - 1 مللي (800 ريال) 💉</option>
                <option value="فيلر ستيلاج (3 مللي)">فيلر ستيلاج - 3 مللي (1950 ريال) 💉</option>
                <option value="بوتوكس الجبهة">بوتوكس الجبهة (650 ريال) 💉</option>
                <option value="بوتوكس كامل الوجه">بوتوكس كامل الوجه (900 ريال) 💉</option>
                <option value="زراعة أسنان أمريكية + التركيبة + الكشفية">زراعة أسنان أمريكية + التركيبة + الكشفية (1700 ريال) 🦷</option>
                <option value="تقويم الأسنان (دفعة أولى)">تقويم الأسنان - دفعة أولى (800 ريال) 🦷</option>
                <option value="ابتسامة هوليوود (قسط أول)">ابتسامة هوليوود - قسط أول (1500 ريال) 🦷</option>
                <option value="تبييض وتلميع الأسنان بالليزر">تبييض وتلميع أسنان بالليزر (400 ريال) 🦷</option>
                <option value="3 جلسات ليزر لمنطقة واحدة">3 جلسات ليزر لمنطقة واحدة (250 ريال) ⚡</option>
                <option value="3 جلسات ليزر جسم كامل للسيدات">3 جلسات ليزر جسم كامل للسيدات (750 ريال) ⚡</option>
                <option value="3 جلسات ليزر جسم كامل للرجال">3 جلسات ليزر جسم كامل للرجال (850 ريال) ⚡</option>
                <option value="5 زيارات لتكسير الدهون الموضعية بدون جراحة">5 زيارات لتكسير الدهون الموضعية بدون جراحة (850 ريال فقط) 🏃‍♀️</option>
              </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1"
                  >الفرع</label
                >
                <select
                  name="branch"
                  required
                  class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#8a6d4d] focus:outline-none text-right text-sm bg-white"
                >
                  <option value="">- الفرع -</option>
                  <option value="السلامة">فرع السلامة</option>
                  <option value="الصفا">فرع الصفا</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1"
                  >الجنسية</label
                >
                <select
                  name="nationality"
                  required
                  class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#8a6d4d] focus:outline-none text-right text-sm bg-white"
                >
                  <option value="">- الجنسية -</option>
                  <option value="saudi">سعودي</option>
                  <option value="none_saudi">غير سعودي</option>
                </select>
              </div>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1"
                >لديك كود خصم؟</label
              >
              <div class="flex gap-2">
                <input
                  type="text"
                  id="copon"
                  name="copon"
                  class="flex-grow px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#8a6d4d] focus:outline-none text-center text-sm"
                  placeholder="ادخل الكود هنا"
                />
                <button
                  type="button"
                  id="apply_coupon"
                  class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg text-xs font-semibold transition"
                >
                  تطبيق
                </button>
              </div>
              <div id="coupon_message" class="text-xs mt-1 font-semibold"></div>
            </div>
            <div
              class="bg-[#fcf8f5] p-2.5 rounded-lg border border-[#f3e1d3] flex justify-between items-center text-sm font-bold"
            >
              <span class="text-gray-600">السعر النهائي:</span>
              <span id="price" class="text-[#8a6d4d]"
                >يرجى اختيار العرض والفرع والجنسية</span
              >
            </div>
            <div class="space-y-2 pt-1">
              <label class="block text-xs font-medium text-gray-700"
                >طريقة الدفع المفضلة:</label
              >
              <div class="grid grid-cols-1 gap-2">
                <label
                  class="flex items-center gap-2 p-2.5 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50 text-xs"
                >
                  <input
                    type="radio"
                    name="payment_type"
                    value="tap"
                    checked
                    class="text-[#8a6d4d] focus:ring-[#8a6d4d]"
                  />
                  <span>الدفع كاملاً دفعة واحدة</span>
                </label>
                <label
                  class="flex items-center gap-2 p-2.5 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50 text-xs"
                >
                  <input
                    type="radio"
                    name="payment_type"
                    value="tabby"
                    class="text-[#8a6d4d] focus:ring-[#8a6d4d]"
                  />
                  <span>الدفع بنظام التقسيط شهرياً (Tabby)</span>
                </label>
                <label
                  class="flex items-center gap-2 p-2.5 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50 text-xs"
                >
                  <input
                    type="radio"
                    name="payment_type"
                    value="tamara"
                    class="text-[#8a6d4d] focus:ring-[#8a6d4d]"
                  />
                  <span>الدفع بنظام التقسيط شهرياً (Tamara)</span>
                </label>
              </div>
            </div>
            <button
              type="submit"
              class="w-full bg-[#8a6d4d] hover:bg-[#735a3f] text-white font-semibold py-3 rounded-lg transition duration-300 shadow-md text-sm"
            >
              تأكيد الحجز الآن
            </button>
          </form>
          <!-- ==================== END OF ORIGINAL FORM ==================== -->

          <div
            id="successMessage"
            class="hidden mt-6 text-green-600 font-semibold text-center text-sm"
          >
            تم تسجيل طلبك بنجاح وسيتم التواصل معكم! ✨
          </div>
        </div>
      </div>
    </section>

    <script src="js/main.js"></script>
  </body>
</html>
